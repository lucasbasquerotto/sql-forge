services:
  mysql:
    image: mysql:8.0.45
    container_name: sql-forge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: sql_forge_test
    ports:
      - "3306:3306"
    volumes:
      - ./tests/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 15

  rust:
    image: rust:1.93.0
    container_name: sql-forge-rust
    working_dir: /app
    command: >
      sh -c "
        apt-get update &&
        apt-get install -y --no-install-recommends default-libmysqlclient-dev pkg-config &&
        cargo install sqlx-cli &&
        rustup component add rustfmt clippy &&
        tail -f /dev/null
      "
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/sql_forge_test
      SQLX_OFFLINE: "false"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    volumes:
      - .:/app:rw
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
  cargo-registry:
  cargo-git:
